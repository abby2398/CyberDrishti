version: "3.9"

# ─────────────────────────────────────────────
#  CyberDrishti  —  docker-compose.yml
#  Run:  docker compose up --build
# ─────────────────────────────────────────────

services:

  # ── PostgreSQL Database ──────────────────────
  db:
    image: postgres:15-alpine
    container_name: cyberdrishti_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: cyberdrishti
      POSTGRES_USER: drishti
      POSTGRES_PASSWORD: ${DB_PASSWORD:-CyberDrishti2026}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drishti -d cyberdrishti"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (Task Queue) ───────────────────────
  redis:
    image: redis:7-alpine
    container_name: cyberdrishti_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-RedisDrishti2026}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-RedisDrishti2026}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API (FastAPI) ────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cyberdrishti_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://drishti:${DB_PASSWORD:-CyberDrishti2026}@db:5432/cyberdrishti
      REDIS_URL: redis://:${REDIS_PASSWORD:-RedisDrishti2026}@redis:6379/0
    volumes:
      - ./backend:/app
      - ./logs:/app/logs
      - ./data:/app/data
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Celery Worker (Scanner Engine) ──────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cyberdrishti_worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://drishti:${DB_PASSWORD:-CyberDrishti2026}@db:5432/cyberdrishti
      REDIS_URL: redis://:${REDIS_PASSWORD:-RedisDrishti2026}@redis:6379/0
    volumes:
      - ./backend:/app
      - ./logs:/app/logs
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.worker worker --loglevel=info --concurrency=4

  # ── Celery Beat (Scheduler) ──────────────────
  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cyberdrishti_scheduler
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://drishti:${DB_PASSWORD:-CyberDrishti2026}@db:5432/cyberdrishti
      REDIS_URL: redis://:${REDIS_PASSWORD:-RedisDrishti2026}@redis:6379/0
    volumes:
      - ./backend:/app
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.worker beat --loglevel=info

volumes:
  postgres_data:
  redis_data:
